about:
  title: Curating the best of open source
  subtitle: We believe in the power of open source to transform how we build software. Our mission is to surface the most reputable tools.
  storyTitle: Our story
  storyParagraphs:
    - Open Source Softwares was founded by a team of developers and designers who wanted to cut through the noise. With thousands of open source projects available, finding the truly great ones can be overwhelming.
    - We've built a curated directory that highlights only the most reputable, well-maintained, and community-loved open source tools. Every project on our list has been vetted for quality, documentation, and active development.
    - Today, we serve thousands of users who rely on our recommendations to power their workflows.
  valuesTitle: Our values
  valuesSubtitle: We're guided by a set of core values that shape everything we do — from how we curate projects to how we treat our community.
  values:
    - icon: fa-solid fa-shield-alt
      title: Trustworthy
      description: Every project is vetted for quality and security.
    - icon: fa-solid fa-users
      title: Community-first
      description: We listen to our users and evolve with their needs.
    - icon: fa-solid fa-gem
      title: Curated quality
      description: We surface only the best, not the most popular.
    - icon: fa-solid fa-rocket
      title: Innovation
      description: We highlight tools that push boundaries.

